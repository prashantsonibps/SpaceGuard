# SpaceGuard Auto-Deploy
# Triggers on push to main branch. Deploys backend to Cloud Run and frontend to Firebase Hosting.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   GCP_PROJECT_ID      — spaceguard-a0dbc
#   GCP_SA_KEY          — Service account JSON key (see setup commands below)
#   FIREBASE_TOKEN      — Output of: npx firebase-tools login:ci
#   MISTRAL_API_KEY     — From console.mistral.ai
#   NASA_API_KEY        — From api.nasa.gov (or omit to use DEMO_KEY)
#   OPENWEATHER_API_KEY — From openweathermap.org (optional)
#
# One-time GCP setup (run locally):
#
#   gcloud iam service-accounts create github-actions \
#     --display-name="GitHub Actions" --project=spaceguard-a0dbc
#
#   for ROLE in roles/run.admin roles/iam.serviceAccountUser \
#               roles/cloudbuild.builds.editor roles/artifactregistry.writer \
#               roles/storage.admin; do
#     gcloud projects add-iam-policy-binding spaceguard-a0dbc \
#       --member="serviceAccount:github-actions@spaceguard-a0dbc.iam.gserviceaccount.com" \
#       --role="$ROLE"
#   done
#
#   gcloud iam service-accounts keys create key.json \
#     --iam-account=github-actions@spaceguard-a0dbc.iam.gserviceaccount.com
#   # Paste contents of key.json into GitHub secret GCP_SA_KEY, then:
#   rm key.json

name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        working-directory: backend
        run: |
          gcloud run deploy spaceguard-api \
            --source . \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --set-env-vars "MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }},NASA_API_KEY=${{ secrets.NASA_API_KEY }},OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}"

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://spaceguard-api-1040980823268.us-central1.run.app
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project ${{ secrets.GCP_PROJECT_ID }}
