# SpaceGuard Auto-Deploy
# Triggers on push to main branch. Deploys backend to Cloud Run and frontend to Firebase Hosting.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   GCP_PROJECT_ID      — spaceguard-a0dbc
#   GCP_SA_KEY          — Service account JSON key
#   FIREBASE_TOKEN      — Output of: npx firebase-tools login:ci
#   MISTRAL_API_KEY     — From console.mistral.ai
#   NASA_API_KEY        — From api.nasa.gov
#   OPENWEATHER_API_KEY — From openweathermap.org
#
name: Deploy SpaceGuard

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        working-directory: backend
        run: |
          gcloud run deploy spaceguard-api \
            --source . \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --set-env-vars "MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }},NASA_API_KEY=${{ secrets.NASA_API_KEY }},OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}"

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://spaceguard-api-1040980823268.us-central1.run.app
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPACEGUARD_A0DBC }}
          channelId: live
          projectId: spaceguard-a0dbc
